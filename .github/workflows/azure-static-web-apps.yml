name: Deploy to Azure Static Web Apps

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_swa:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy SWA
    steps:
      - uses: actions/checkout@v4

      - name: Build And Deploy
        id: deploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "/"
          api_location: ""
          app_build_command: "npx craco build"
          output_location: "build"

  deploy_function_app:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    name: Deploy API to Function App
    steps:
      - uses: actions/checkout@v4

      - name: Create deployment package
        run: |
          cd api
          zip -r /tmp/ocm-nexus-api.zip .
          echo "Package: $(du -sh /tmp/ocm-nexus-api.zip)"

      - name: Deploy via Kudu ZipDeploy
        env:
          KUDU_USER: ${{ secrets.KUDU_USER }}
          KUDU_PASS: ${{ secrets.KUDU_PASS }}
        run: |
          echo "::add-mask::$KUDU_PASS"
          KUDU_URL="https://ocm-nexus-api-a0b2hmhvded7hbfy.scm.eastus2-01.azurewebsites.net/api/zipdeploy"
          echo "Deploying to: $KUDU_URL"

          HTTP_STATUS=$(curl -s -o /tmp/deploy.log -w "%{http_code}" \
            -X POST \
            -u "${KUDU_USER}:${KUDU_PASS}" \
            --data-binary @/tmp/ocm-nexus-api.zip \
            -H "Content-Type: application/zip" \
            "$KUDU_URL")

          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/deploy.log

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✅ Deployment successful"
          else
            echo "❌ Deployment failed with status $HTTP_STATUS"
            exit 1
          fi

  close_pull_request:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close PR Preview
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: "close"
